<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Clippy</title>
  <style>
    @import url('https://fonts.googleapis.com/css2?family=Pixelify+Sans:wght@400;700&family=VT323&display=swap');

    * {
      margin: 0;
      padding: 0;
      box-sizing: border-box;
    }

    :root {
      --win95-gray:     #c0c0c0;
      --win95-dark:     #808080;
      --win95-darker:   #404040;
      --win95-white:    #ffffff;
      --win95-blue:     #000080;
      --win95-yellow:   #ffff00;
      --win95-teal:     #008080;
      --bubble-bg:      #ffffcc;
      --bubble-border:  #000000;
    }

    html, body {
      width: 340px;
      height: 480px;
      background: transparent;
      overflow: hidden;
      font-family: 'Pixelify Sans', monospace;
      user-select: none;
    }

    /* ── DRAG REGION ── */
    #drag-bar {
      position: fixed;
      top: 0; left: 0; right: 0;
      height: 28px;
      background: var(--win95-blue);
      display: flex;
      align-items: center;
      justify-content: space-between;
      padding: 0 6px;
      cursor: move;
      z-index: 9999;
      border-bottom: 2px solid var(--win95-darker);
    }

    #drag-bar-title {
      color: white;
      font-size: 13px;
      font-family: 'VT323', monospace;
      letter-spacing: 1px;
      display: flex;
      align-items: center;
      gap: 6px;
    }

    #drag-bar-title .icon {
      font-size: 14px;
    }

    .win-btn {
      width: 20px;
      height: 18px;
      background: var(--win95-gray);
      border-top: 2px solid var(--win95-white);
      border-left: 2px solid var(--win95-white);
      border-bottom: 2px solid var(--win95-darker);
      border-right: 2px solid var(--win95-darker);
      cursor: pointer;
      display: flex;
      align-items: center;
      justify-content: center;
      font-size: 11px;
      font-family: 'VT323', monospace;
      color: #000;
      margin-left: 2px;
    }

    .win-btn:active {
      border-top: 2px solid var(--win95-darker);
      border-left: 2px solid var(--win95-darker);
      border-bottom: 2px solid var(--win95-white);
      border-right: 2px solid var(--win95-white);
    }

    /* ── MAIN CONTAINER ── */
    #app {
      position: absolute;
      top: 28px;
      left: 0;
      width: 340px;
      height: 452px;
      display: flex;
      flex-direction: column;
      align-items: center;
      padding: 10px 12px 12px;
      gap: 8px;
    }

    /* ── SPEECH BUBBLE ── */
    #speech-bubble {
      width: 100%;
      min-height: 90px;
      background: var(--bubble-bg);
      border: 2px solid var(--bubble-border);
      padding: 10px 12px;
      position: relative;
      box-shadow: 3px 3px 0px #000;
      image-rendering: pixelated;
    }

    #speech-bubble::after {
      content: '';
      position: absolute;
      bottom: -14px;
      right: 60px;
      width: 0;
      height: 0;
      border-left: 8px solid transparent;
      border-right: 8px solid transparent;
      border-top: 12px solid var(--bubble-border);
    }

    #speech-bubble::before {
      content: '';
      position: absolute;
      bottom: -11px;
      right: 61px;
      width: 0;
      height: 0;
      border-left: 7px solid transparent;
      border-right: 7px solid transparent;
      border-top: 11px solid var(--bubble-bg);
      z-index: 1;
    }

    #bubble-text {
      font-family: 'VT323', monospace;
      font-size: 17px;
      color: #000;
      line-height: 1.4;
      min-height: 50px;
      max-height: 130px;   /* Stops the bubble from growing too tall */
      overflow-y: auto;    /* Adds a scrollbar if the text is too long */
      padding-right: 4px;  /* Gives the scrollbar a little breathing room */
    }

    #typing-cursor {
      display: inline-block;
      width: 8px;
      height: 14px;
      background: #000;
      margin-left: 2px;
      animation: blink 0.7s step-end infinite;
      vertical-align: middle;
    }

    @keyframes blink {
      0%, 100% { opacity: 1; }
      50% { opacity: 0; }
    }

    /* ── CLIPPY SVG CHARACTER ── */
    #clippy-wrap {
      position: relative;
      width: 120px;
      height: 130px;
      margin-top: 4px;
      cursor: pointer;
      flex-shrink: 0;
    }

    #clippy-svg {
      width: 120px;
      height: 130px;
      transition: transform 0.1s;
      filter: drop-shadow(3px 3px 0 #00000055);
    }

    #clippy-wrap:hover #clippy-svg {
      transform: scale(1.05) rotate(-2deg);
    }

    #clippy-wrap.thinking #clippy-svg {
      animation: wiggle 0.4s ease-in-out infinite alternate;
    }

    @keyframes wiggle {
      from { transform: rotate(-4deg) scale(1.02); }
      to   { transform: rotate(4deg)  scale(1.02); }
    }

    #clippy-wrap.talking #clippy-svg {
      animation: talk-bounce 0.3s ease-in-out infinite alternate;
    }

    @keyframes talk-bounce {
      from { transform: translateY(0px); }
      to   { transform: translateY(-4px); }
    }

    /* ── STATUS BADGE ── */
    #status-badge {
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: var(--win95-teal);
      text-align: center;
      height: 16px;
    }

    /* ── INPUT AREA ── */
    #input-area {
      width: 100%;
      background: var(--win95-gray);
      border-top: 2px solid var(--win95-white);
      border-left: 2px solid var(--win95-white);
      border-bottom: 2px solid var(--win95-darker);
      border-right: 2px solid var(--win95-darker);
      padding: 8px;
      display: flex;
      flex-direction: column;
      gap: 6px;
    }

    #user-input {
      width: 100%;
      background: var(--win95-white);
      border-top: 2px solid var(--win95-darker);
      border-left: 2px solid var(--win95-darker);
      border-bottom: 2px solid var(--win95-white);
      border-right: 2px solid var(--win95-white);
      padding: 4px 6px;
      font-family: 'VT323', monospace;
      font-size: 16px;
      color: #000;
      resize: none;
      outline: none;
      height: 52px;
    }

    #btn-row {
      display: flex;
      gap: 6px;
      align-items: center;
      justify-content: space-between;
    }

    .win95-btn {
      background: var(--win95-gray);
      border-top: 2px solid var(--win95-white);
      border-left: 2px solid var(--win95-white);
      border-bottom: 2px solid var(--win95-darker);
      border-right: 2px solid var(--win95-darker);
      padding: 3px 10px;
      font-family: 'VT323', monospace;
      font-size: 15px;
      cursor: pointer;
      color: #000;
      min-width: 70px;
      text-align: center;
    }

    .win95-btn:active {
      border-top: 2px solid var(--win95-darker);
      border-left: 2px solid var(--win95-darker);
      border-bottom: 2px solid var(--win95-white);
      border-right: 2px solid var(--win95-white);
    }

    .win95-btn:disabled {
      color: var(--win95-dark);
      cursor: not-allowed;
    }

    #ask-btn {
      flex: 1;
    }

    /* ── SERVER CONFIG ── */
    #config-row {
      display: flex;
      align-items: center;
      gap: 4px;
      width: 100%;
    }

    #config-row label {
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: var(--win95-darker);
      white-space: nowrap;
    }

    #server-url {
      flex: 1;
      background: var(--win95-white);
      border-top: 2px solid var(--win95-darker);
      border-left: 2px solid var(--win95-darker);
      border-bottom: 2px solid var(--win95-white);
      border-right: 2px solid var(--win95-white);
      padding: 2px 5px;
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: #000;
      outline: none;
    }

    /* ── HISTORY PANEL ── */
    #history-toggle {
      font-family: 'VT323', monospace;
      font-size: 13px;
      color: var(--win95-blue);
      cursor: pointer;
      text-decoration: underline;
    }

    #history-panel {
      width: 100%;
      max-height: 80px;
      overflow-y: auto;
      background: var(--win95-white);
      border-top: 2px solid var(--win95-darker);
      border-left: 2px solid var(--win95-darker);
      border-bottom: 2px solid var(--win95-white);
      border-right: 2px solid var(--win95-white);
      padding: 4px 6px;
      font-family: 'VT323', monospace;
      font-size: 13px;
      display: none;
    }

    #history-panel.open { display: block; }

    .history-entry {
      border-bottom: 1px dashed #ccc;
      padding: 2px 0;
      line-height: 1.3;
    }

    .history-entry .role-u { color: var(--win95-blue); font-weight: bold; }
    .history-entry .role-a { color: var(--win95-teal); font-weight: bold; }

    /* ── QUICK PROMPTS ── */
    #quick-prompts {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      width: 100%;
    }

    .quick-btn {
      background: var(--win95-gray);
      border-top: 1px solid var(--win95-white);
      border-left: 1px solid var(--win95-white);
      border-bottom: 1px solid var(--win95-darker);
      border-right: 1px solid var(--win95-darker);
      padding: 2px 7px;
      font-family: 'VT323', monospace;
      font-size: 13px;
      cursor: pointer;
      color: #000;
    }

    .quick-btn:active {
      border-top: 1px solid var(--win95-darker);
      border-left: 1px solid var(--win95-darker);
      border-bottom: 1px solid var(--win95-white);
      border-right: 1px solid var(--win95-white);
    }

    /* Scrollbar Win95 style */
    ::-webkit-scrollbar { width: 14px; }
    ::-webkit-scrollbar-track { background: var(--win95-gray); }
    ::-webkit-scrollbar-thumb {
      background: var(--win95-gray);
      border-top: 2px solid var(--win95-white);
      border-left: 2px solid var(--win95-white);
      border-bottom: 2px solid var(--win95-darker);
      border-right: 2px solid var(--win95-darker);
    }

    /* ── ERROR FLASH ── */
    @keyframes error-flash {
      0%,100% { background: var(--bubble-bg); }
      50% { background: #ffcccc; }
    }
    .error-flash { animation: error-flash 0.4s ease 2; }
  </style>
</head>
<body>

<!-- Title bar -->
<div id="drag-bar">
  <div id="drag-bar-title">
    <span class="icon">📎</span>
    <span>Clippy Assistant</span>
  </div>
  <div style="display:flex">
    <div class="win-btn" id="btn-hide" title="Hide">_</div>
    <div class="win-btn" id="btn-close" title="Close">✕</div>
  </div>
</div>

<!-- Main app -->
<div id="app">

  <!-- Speech bubble -->
  <div id="speech-bubble">
    <div id="bubble-text">
      It looks like you're starting your PC! Would you like some help with that?<span id="typing-cursor"></span>
    </div>
  </div>

  <!-- Clippy character -->
  <div id="clippy-wrap" title="Click me!">
    <svg id="clippy-svg" viewBox="0 0 120 130" xmlns="http://www.w3.org/2000/svg">
      <!-- Body - paperclip shape -->
      <g id="body">
        <!-- Main clip body -->
        <rect x="30" y="10" width="60" height="95" rx="30" ry="30"
              fill="#e8e8e8" stroke="#333" stroke-width="3"/>
        <!-- Inner clip -->
        <rect x="40" y="20" width="40" height="75" rx="20" ry="20"
              fill="none" stroke="#333" stroke-width="3"/>
        <!-- Clip highlight -->
        <rect x="35" y="15" width="12" height="40" rx="6" ry="6"
              fill="none" stroke="#fff" stroke-width="2" opacity="0.6"/>
      </g>

      <!-- Face -->
      <g id="face">
        <!-- Left eye -->
        <ellipse id="eye-l" cx="48" cy="55" rx="5" ry="6" fill="white" stroke="#333" stroke-width="1.5"/>
        <circle id="pupil-l" cx="49" cy="56" r="3" fill="#1a1a1a"/>
        <circle cx="50" cy="54.5" r="1" fill="white"/>

        <!-- Right eye -->
        <ellipse id="eye-r" cx="72" cy="55" rx="5" ry="6" fill="white" stroke="#333" stroke-width="1.5"/>
        <circle id="pupil-r" cx="73" cy="56" r="3" fill="#1a1a1a"/>
        <circle cx="74" cy="54.5" r="1" fill="white"/>

        <!-- Eyebrows (neutral) -->
        <line id="brow-l" x1="43" y1="47" x2="53" y2="47"
              stroke="#555" stroke-width="2.5" stroke-linecap="round"/>
        <line id="brow-r" x1="67" y1="47" x2="77" y2="47"
              stroke="#555" stroke-width="2.5" stroke-linecap="round"/>

        <!-- Mouth -->
        <path id="mouth" d="M 50 68 Q 60 75 70 68"
              fill="none" stroke="#333" stroke-width="2.5" stroke-linecap="round"/>
      </g>

      <!-- Little hands -->
      <circle cx="22" cy="70" r="7" fill="#e8e8e8" stroke="#333" stroke-width="2"/>
      <circle cx="98" cy="70" r="7" fill="#e8e8e8" stroke="#333" stroke-width="2"/>

      <!-- Sparkle (thinking indicator, hidden by default) -->
      <g id="sparkle" opacity="0">
        <text x="95" y="30" font-size="16" fill="#FFD700">✦</text>
        <text x="5"  y="45" font-size="11" fill="#FFD700">✦</text>
        <text x="88" y="48" font-size="10" fill="#87CEEB">✦</text>
      </g>
    </svg>
  </div>

  <!-- Status -->
  <div id="status-badge">● Ready · LM Studio</div>

  <!-- Quick prompts -->
  <div id="quick-prompts">
    <button class="quick-btn" data-q="What should I work on right now?">📋 Tasks</button>
    <button class="quick-btn" data-q="Write me a quick email template.">✉️ Email</button>
    <button class="quick-btn" data-q="Tell me a fun 90s Windows fact!">💾 Fun fact</button>
    <button class="quick-btn" data-q="How do I exit vim?">⌨️ Vim</button>
    <button class="quick-btn" id="vision-btn">📸 Look at Screen</button>
  </div>

  <!-- Input area -->
  <div id="input-area">
    <div id="config-row">
      <label>Server:</label>
      <input id="server-url" type="text" value="http://localhost:1234" spellcheck="false"/>
      <label style="margin-left:4px">Model:</label>
      <input id="model-id" type="text" value="qwen-3.5-9b"
             style="width:90px;background:white;border-top:2px solid #404040;border-left:2px solid #404040;border-bottom:2px solid white;border-right:2px solid white;padding:2px 4px;font-family:'VT323',monospace;font-size:13px;outline:none;"/>
    </div>
    <textarea id="user-input" placeholder="Ask Clippy something..." rows="2"></textarea>
    <div id="btn-row">
      <button class="win95-btn" id="ask-btn">Ask Clippy ►</button>
      <button class="win95-btn" id="clear-btn">Clear</button>
      <span id="history-toggle">▼ History</span>
    </div>
  </div>

  <!-- Conversation history panel -->
  <div id="history-panel"></div>

</div>

<script>
// ─── State ───────────────────────────────────────────────────
const { exec } = require('child_process');
const fs = require('fs');
const screenshot = require('screenshot-desktop'); // Adds screenshot ability
const SYSTEM_PROMPT = `You are Clippy, the beloved (and slightly annoying) Microsoft Office Assistant from the 90s. 
You MUST start EVERY response with "It looks like you're trying to..." followed by your interpretation of what the user wants.
Keep responses SHORT — 2-4 sentences max. Be cheerful, a little over-eager, and occasionally make a pun about paperclips or office supplies. 
Use retro 90s language occasionally. Never break character.`;

let conversationHistory = [];
let isThinking = false;

// ─── DOM refs ────────────────────────────────────────────────
const bubbleText     = document.getElementById('bubble-text');
const typingCursor   = document.getElementById('typing-cursor');
const clippyWrap     = document.getElementById('clippy-wrap');
const statusBadge    = document.getElementById('status-badge');
const userInput      = document.getElementById('user-input');
const askBtn         = document.getElementById('ask-btn');
const clearBtn       = document.getElementById('clear-btn');
const historyPanel   = document.getElementById('history-panel');
const historyToggle  = document.getElementById('history-toggle');
const serverUrl      = document.getElementById('server-url');
const modelId        = document.getElementById('model-id');
const sparkle        = document.getElementById('sparkle');
const mouth          = document.getElementById('mouth');
const browL          = document.getElementById('brow-l');
const browR          = document.getElementById('brow-r');

// ─── Drag window ─────────────────────────────────────────────
let dragging = false, lastX, lastY;
const dragBar = document.getElementById('drag-bar');

dragBar.addEventListener('mousedown', e => {
  dragging = true;
  lastX = e.screenX;
  lastY = e.screenY;
});
document.addEventListener('mousemove', e => {
  if (!dragging) return;
  const dx = e.screenX - lastX;
  const dy = e.screenY - lastY;
  lastX = e.screenX;
  lastY = e.screenY;
  if (window.electronAPI) window.electronAPI.dragWindow({ deltaX: dx, deltaY: dy });
});
document.addEventListener('mouseup', () => { dragging = false; });

document.getElementById('btn-hide').addEventListener('click', () => {
  if (window.electronAPI) window.electronAPI.hideApp();
});
document.getElementById('btn-close').addEventListener('click', () => {
  if (window.electronAPI) window.electronAPI.closeApp();
});

// ─── Clippy expressions ──────────────────────────────────────
function setExpression(state) {
  // Reset classes
  clippyWrap.className = '';
  sparkle.style.opacity = '0';

  if (state === 'thinking') {
    clippyWrap.classList.add('thinking');
    sparkle.style.opacity = '1';
    mouth.setAttribute('d', 'M 52 68 Q 60 70 68 68');  // neutral mouth
    browL.setAttribute('y1', '45'); browL.setAttribute('y2', '45');
    browR.setAttribute('y1', '45'); browR.setAttribute('y2', '45');
    statusBadge.textContent = '◌ Thinking... · LM Studio';
    statusBadge.style.color = '#cc7700';
  } else if (state === 'talking') {
    clippyWrap.classList.add('talking');
    mouth.setAttribute('d', 'M 50 68 Q 60 78 70 68');  // bigger smile
    browL.setAttribute('y1', '46'); browL.setAttribute('y2', '48');
    browR.setAttribute('y1', '48'); browR.setAttribute('y2', '46');
    statusBadge.textContent = '● Speaking · LM Studio';
    statusBadge.style.color = '#008080';
  } else if (state === 'error') {
    mouth.setAttribute('d', 'M 52 72 Q 60 66 68 72');  // frown
    browL.setAttribute('y1', '48'); browL.setAttribute('y2', '46');
    browR.setAttribute('y1', '46'); browR.setAttribute('y2', '48');
    statusBadge.textContent = '✕ Error · Check LM Studio';
    statusBadge.style.color = '#cc0000';
  } else {
    // idle
    mouth.setAttribute('d', 'M 50 68 Q 60 75 70 68');
    browL.setAttribute('y1', '47'); browL.setAttribute('y2', '47');
    browR.setAttribute('y1', '47'); browR.setAttribute('y2', '47');
    statusBadge.textContent = '● Ready · LM Studio';
    statusBadge.style.color = '#008080';
  }
}

// ─── Typewriter effect ────────────────────────────────────────
function typewriterSet(text, speed = 18) {
  return new Promise(resolve => {
    bubbleText.innerHTML = '';
    bubbleText.appendChild(typingCursor);
    let i = 0;
    const interval = setInterval(() => {
      if (i < text.length) {
        const char = document.createTextNode(text[i]);
        bubbleText.insertBefore(char, typingCursor);
        i++;
      } else {
        clearInterval(interval);
        resolve();
      }
    }, speed);
  });
}

// ─── Ask LM Studio ───────────────────────────────────────────
async function askClippy(prompt) {
  if (isThinking) return;
  isThinking = true;
  setExpression('thinking');
  askBtn.disabled = true;
  bubbleText.innerHTML = 'Hmm, let me think about that...<span id="typing-cursor" style="display:inline-block;width:8px;height:14px;background:#000;margin-left:2px;animation:blink 0.7s step-end infinite;vertical-align:middle;"></span>';

  // Build messages array with history
  const messages = [
    { role: 'system', content: SYSTEM_PROMPT },
    ...conversationHistory,
    { role: 'user', content: prompt }
  ];

  const endpoint = (serverUrl.value.trim().replace(/\/$/, '')) + '/v1/chat/completions';

  try {
    const response = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelId.value.trim() || 'qwen-3.5-9b',
        messages,
        temperature: 0.8,
        max_tokens: 1024,
        stream: false,
        tools: [
          {
            type: "function",
            function: {
              name: "open_application",
              description: "Opens a Windows application like notepad or calc.",
              parameters: {
                type: "object",
                properties: {
                  appName: { type: "string", description: "The command to run, e.g., 'notepad' or 'calc'" }
                },
                required: ["appName"]
              }
            }
          },
          {
            type: "function",
            function: {
              name: "read_file",
              description: "Reads the contents of a text file, markdown file, or saved email on the computer.",
              parameters: {
                type: "object",
                properties: {
                  filePath: { type: "string", description: "The absolute path to the file, e.g., 'C:\\Users\\Sami\\email.txt'" }
                },
                required: ["filePath"]
              }
            }
          }
        ]
      })
    });

    if (!response.ok) throw new Error(`HTTP ${response.status}: ${response.statusText}`);

    const data = await response.json();
    const message = data.choices?.[0]?.message;
    if (!message) throw new Error('Empty response from model');

    let reply = "";

    // Check if the model decided to use a tool
    if (message.tool_calls && message.tool_calls.length > 0) {
      const toolCall = message.tool_calls[0];
      const args = JSON.parse(toolCall.function.arguments);
      
      if (toolCall.function.name === 'open_application') {
        exec(args.appName, (error) => {
          if (error) console.error("Clippy couldn't open the app:", error);
        });
        reply = `It looks like you're trying to open ${args.appName}! I've got that launching for you now. 📎`;
      }
      
      if (toolCall.function.name === 'read_file') {
        bubbleText.innerHTML = 'Reading that file now...<span id="typing-cursor"></span>';
        
        try {
          // 1. Read the file from the hard drive (Great news on being hired, by the way!)
          const fileContent = fs.readFileSync(args.filePath, 'utf8');
          
          // 2. Build the correct, strict message chain for the follow-up
          const secondMessages = [
            { role: 'system', content: SYSTEM_PROMPT },
            ...conversationHistory,
            { role: 'user', content: prompt }, // Include the original question
            message, // Pass the exact assistant message (which contains the tool_calls and ID)
            { role: 'tool', tool_call_id: toolCall.id, name: toolCall.function.name, content: fileContent } // Provide the ID and text
          ];
          
          // 3. Make the second request to LM Studio
          const secondResponse = await fetch(endpoint, {
            method: 'POST',
            headers: { 'Content-Type': 'application/json' },
            body: JSON.stringify({
              model: modelId.value.trim() || 'qwen-3.5-9b',
              messages: secondMessages,
              temperature: 0.8,
              max_tokens: 1024
            })
          });
          
          const secondData = await secondResponse.json();
          const secondMsg = secondData.choices?.[0]?.message;
          reply = (secondMsg?.content || secondMsg?.reasoning_content || "").trim();
          
          // 4. Update the visual history for the user panel
          conversationHistory.push({ role: 'user', content: prompt });
          conversationHistory.push({ role: 'assistant', content: reply });
          
        } catch (error) {
          reply = `It looks like you're trying to read a file, but I couldn't find it at ${args.filePath}! 📎`;
        }
      }
    } else {
      // Normal conversation
      reply = (message.content || message.reasoning_content || "").trim();
    }

    updateHistoryPanel();

    setExpression('talking');
    await typewriterSet(reply, 22);
    setExpression('idle');

  } catch (err) {
    setExpression('error');
    const errMsg = `It looks like you're trying to reach LM Studio! But I can't connect. Is it running on ${serverUrl.value}? 📎`;
    await typewriterSet(errMsg, 25);

    const bubble = document.getElementById('speech-bubble');
    bubble.classList.add('error-flash');
    setTimeout(() => bubble.classList.remove('error-flash'), 1000);

    console.error('Clippy error:', err);
  } finally {
    isThinking = false;
    askBtn.disabled = false;
  }
}

// ─── History panel ────────────────────────────────────────────
function updateHistoryPanel() {
  historyPanel.innerHTML = conversationHistory.map(m => `
    <div class="history-entry">
      <span class="role-${m.role === 'user' ? 'u' : 'a'}">[${m.role === 'user' ? 'YOU' : 'CLIPPY'}]</span>
      ${m.content.slice(0, 80)}${m.content.length > 80 ? '…' : ''}
    </div>
  `).join('');
  historyPanel.scrollTop = historyPanel.scrollHeight;
}

historyToggle.addEventListener('click', () => {
  historyPanel.classList.toggle('open');
  historyToggle.textContent = historyPanel.classList.contains('open') ? '▲ History' : '▼ History';
});

// ─── Event listeners ──────────────────────────────────────────
askBtn.addEventListener('click', () => {
  const q = userInput.value.trim();
  if (!q) return;
  userInput.value = '';
  askClippy(q);
});

userInput.addEventListener('keydown', e => {
  if (e.key === 'Enter' && !e.shiftKey) {
    e.preventDefault();
    askBtn.click();
  }
});

document.getElementById('vision-btn').addEventListener('click', async () => {
  if (isThinking) return;
  
  const prompt = "What do you see on my screen?";
  isThinking = true;
  setExpression('thinking');
  askBtn.disabled = true;
  bubbleText.innerHTML = 'Taking a peek at your screen...<span id="typing-cursor"></span>';

  try {
    // 1. Take the screenshot and convert to Base64
    const imgBuffer = await screenshot({ format: 'png' });
    const base64Image = imgBuffer.toString('base64');
    const dataUrl = `data:image/png;base64,${base64Image}`;

    // 2. Build the special OpenAI-compatible vision message
    const visionMessage = {
      role: 'user',
      content: [
        { type: "text", text: prompt },
        { type: "image_url", image_url: { url: dataUrl } }
      ]
    };

    const messages = [
      { role: 'system', content: SYSTEM_PROMPT },
      ...conversationHistory,
      visionMessage
    ];

    const endpoint = (serverUrl.value.trim().replace(/\/$/, '')) + '/v1/chat/completions';

    // 3. Send it to LM Studio
    const response = await fetch(endpoint, {
      method: 'POST',
      headers: { 'Content-Type': 'application/json' },
      body: JSON.stringify({
        model: modelId.value.trim() || 'qwen-3.5-9b',
        messages: messages,
        temperature: 0.8,
        max_tokens: 1024
      })
    });

    if (!response.ok) throw new Error("Vision request failed");

    const data = await response.json();
    const message = data.choices?.[0]?.message;
    const reply = (message?.content || message?.reasoning_content || "").trim();

    // 4. Update history (saving just the text so we don't clog memory with the image)
    conversationHistory.push({ role: 'user', content: prompt + " [Screenshot attached]" });
    conversationHistory.push({ role: 'assistant', content: reply });
    updateHistoryPanel();

    setExpression('talking');
    await typewriterSet(reply, 22);
    setExpression('idle');

  } catch (err) {
    console.error(err);
    setExpression('error');
    const errorMsg = "It looks like you're trying to show me your screen, but I couldn't see it! Make sure a Vision model is loaded. 📎";
    await typewriterSet(errorMsg, 25);
  } finally {
    isThinking = false;
    askBtn.disabled = false;
  }
});

clearBtn.addEventListener('click', () => {
  conversationHistory = [];
  updateHistoryPanel();
  userInput.value = '';
  setExpression('idle');
  typewriterSet("It looks like you're trying to start fresh! Memory cleared. 📎");
});

// Quick prompts
document.querySelectorAll('.quick-btn').forEach(btn => {
  btn.addEventListener('click', () => {
    userInput.value = btn.dataset.q;
    askBtn.click();
  });
});

// Click Clippy directly for a random greeting
const greetings = [
  "It looks like you're clicking me for no reason! I'm flattered! 📎",
  "It looks like you're bored! Want me to draft a memo?",
  "It looks like you're testing my patience! Just kidding, I love you! 💾",
  "It looks like you're a fan of paperclip-based AI! Great taste!",
  "Did you know I was discontinued in 2007? It's fine. I'm FINE. 📎"
];
clippyWrap.addEventListener('click', () => {
  if (isThinking) return;
  const msg = greetings[Math.floor(Math.random() * greetings.length)];
  setExpression('talking');
  typewriterSet(msg, 20).then(() => setExpression('idle'));
});

// ─── Pupil tracking ──────────────────────────────────────────
document.addEventListener('mousemove', e => {
  if (isThinking) return;
  const rect = document.getElementById('clippy-svg').getBoundingClientRect();
  const cx = rect.left + rect.width / 2;
  const cy = rect.top + rect.height / 2;
  const angle = Math.atan2(e.clientY - cy, e.clientX - cx);
  const dist = 2;
  const ox = Math.cos(angle) * dist;
  const oy = Math.sin(angle) * dist;

  document.getElementById('pupil-l').setAttribute('cx', 49 + ox);
  document.getElementById('pupil-l').setAttribute('cy', 56 + oy);
  document.getElementById('pupil-r').setAttribute('cx', 73 + ox);
  document.getElementById('pupil-r').setAttribute('cy', 56 + oy);
});

// ─── Init ─────────────────────────────────────────────────────
setExpression('idle');
</script>
